<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B0000" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="1"/>
    </radialGradient>
    <filter id="redglow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="200" height="60" fill="#0a0a0a"/>
  <rect width="200" height="60" fill="url(#glow)"/>
  <!-- NETFLIX text with glow -->
  <text x="100" y="41" text-anchor="middle"
    font-family="Arial Black, Impact, sans-serif"
    font-size="28" font-weight="900"
    fill="#E50914" filter="url(#redglow)"
    letter-spacing="4">NETFLIX</text>
</svg>
